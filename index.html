<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro de Productos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📦 Sistema de Registro de Productos</h1>
            <p>Gestiona tu inventario de forma sencilla y eficiente</p>
        </header>

        <!-- Contenedor principal -->
        <div class="main-content">
            <!-- Formulario -->
            <section class="form-section">
                <div class="card">
                    <h2>Registrar Nuevo Producto</h2>
                    <form id="productoForm">
                        <div class="form-group">
                            <label for="nombre">Nombre del Producto *</label>
                            <input type="text" id="nombre" name="nombre" placeholder="Ej: Laptop" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="precio">Precio ($) *</label>
                                <input type="number" id="precio" name="precio" placeholder="0.00" step="0.01" min="0" required>
                            </div>
                            <div class="form-group">
                                <label for="cantidad">Cantidad *</label>
                                <input type="number" id="cantidad" name="cantidad" placeholder="0" min="0" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="descripcion">Descripción</label>
                            <textarea id="descripcion" name="descripcion" placeholder="Descripción del producto (opcional)" rows="3"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <span>➕</span> Registrar Producto
                        </button>
                    </form>
                </div>
            </section>

            <!-- Listado de productos -->
            <section class="products-section">
                <div class="card">
                    <div class="section-header">
                        <h2>Productos Registrados</h2>
                        <button id="btnRefresh" class="btn btn-secondary">🔄 Actualizar</button>
                    </div>

                    <div id="filtros" class="filtros">
                        <input type="text" id="buscar" placeholder="🔍 Buscar por nombre..." class="search-box">
                        <select id="ordenar" class="select-order">
                            <option value="id">Ordenar por ID</option>
                            <option value="nombre">Ordenar por Nombre</option>
                            <option value="precio">Ordenar por Precio</option>
                            <option value="cantidad">Ordenar por Cantidad</option>
                        </select>
                    </div>

                    <div id="productosContainer" class="productos-grid">
                        <p class="loading">Cargando productos...</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Modal para editar -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Editar Producto</h2>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="editNombre">Nombre</label>
                    <input type="text" id="editNombre" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editPrecio">Precio</label>
                        <input type="number" id="editPrecio" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="editCantidad">Cantidad</label>
                        <input type="number" id="editCantidad" min="0" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editDescripcion">Descripción</label>
                    <textarea id="editDescripcion" rows="3"></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    <button type="button" class="btn btn-secondary" id="btnCancelar">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notificaciones -->
    <div id="notificacion" class="notificacion"></div>

    <script src="script.js"></script>
</body>
</html>
